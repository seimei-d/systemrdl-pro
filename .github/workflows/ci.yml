name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python (LSP)
    runs-on: ubuntu-latest
    # Single-version CI for now — older interpreters (3.10, 3.11) are still
    # supported per pyproject.toml `requires-python = ">=3.10"` but not gated
    # by CI. Bring them back when a real user reports a per-version regression.
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies
        run: |
          uv sync
          uv pip install -e "packages/systemrdl-lsp[dev]"
      - name: Lint
        run: uv run ruff check packages/systemrdl-lsp
      - name: Tests
        run: uv run pytest packages/systemrdl-lsp/tests/ -v
      - name: Smoke test entry point
        run: uv run systemrdl-lsp --version

  typescript:
    name: TypeScript (extension + viewer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Typecheck viewer-core
        run: bun run --cwd packages/rdl-viewer-core typecheck
      - name: Build viewer-core
        # Extension build copies dist/ from viewer-core into media/viewer/, so
        # this must run first.
        run: bun run --cwd packages/rdl-viewer-core build
      - name: Typecheck extension
        run: bun run --cwd packages/vscode-systemrdl-pro typecheck
      - name: Build extension
        run: bun run --cwd packages/vscode-systemrdl-pro build
      - name: Typecheck CLI viewer
        run: bun run --cwd packages/rdl-viewer-cli typecheck

  schema:
    name: JSON Schema validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate schema is well-formed JSON Schema
        run: |
          python3 - <<'PY'
          import json, sys
          schema = json.load(open("schemas/elaborated-tree.json"))
          assert schema.get("$schema", "").startswith("https://json-schema.org/")
          assert schema["title"] == "SystemRDL Elaborated Tree"
          assert schema["properties"]["schemaVersion"]["const"] == "0.1.0"
          print("schema OK")
          PY
