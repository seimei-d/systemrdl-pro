name: Publish vscode-systemrdl-pro to Open VSX

on:
  push:
    tags: ["ext-v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Build viewer-core
        run: bun run --cwd packages/rdl-viewer-core build
      - name: Build extension
        run: bun run --cwd packages/vscode-systemrdl-pro build
      - name: Package .vsix
        run: bun run --cwd packages/vscode-systemrdl-pro package
      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        # ovsx reads OVSX_PAT from env. The script picks the .vsix that
        # `package` just emitted.
        run: bun run --cwd packages/vscode-systemrdl-pro publish:ovsx
