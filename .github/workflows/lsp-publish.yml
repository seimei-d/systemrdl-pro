name: Publish systemrdl-lsp to PyPI

on:
  push:
    tags: ["lsp-v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC publishing — no PyPI token in repo secrets
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Build wheel + sdist
        # uv is workspace-aware — `uv build` from anywhere in the tree drops
        # artifacts at the workspace root `dist/`, not the package-local one.
        # Use --package + --out-dir to land them where pypa/gh-action-pypi-publish
        # expects them.
        run: uv build --package systemrdl-lsp --out-dir packages/systemrdl-lsp/dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/systemrdl-lsp/dist/
          # OIDC: configure trusted publisher on PyPI before first run.
